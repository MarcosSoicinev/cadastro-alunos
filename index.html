<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Aluno</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1D9E75;
      --green-dark:  #0F6E56;
      --green-light: #E1F5EE;
      --text:        #1a1a1a;
      --muted:       #666;
      --border:      #e0e0e0;
      --bg:          #f4f4f2;
      --card:        #ffffff;
      --radius:      14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem 3rem;
    }

    .wrapper { max-width: 500px; margin: 0 auto; }

    /* ── cabeçalho ── */
    .header { text-align: center; margin-bottom: 2rem; }
    .logo {
      width: 68px; height: 68px;
      background: var(--green);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 6px 24px rgba(29,158,117,.28);
    }
    .logo svg { width: 34px; height: 34px; fill: #fff; }
    h1 { font-size: 23px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: var(--muted); }

    /* ── cartão ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }

    /* ── campos ── */
    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 7px;
    }
    label svg { width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    input[type="text"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 15px; color: var(--text);
      background: #fafafa;
      transition: border-color .18s, box-shadow .18s;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,.13);
      background: #fff;
    }
    .char-count { font-size: 11px; color: #bbb; text-align: right; margin-top: 4px; }

    /* ── área de foto ── */
    .photo-wrap { position: relative; }
    .photo-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: #fafafa;
      overflow: hidden;
    }
    .photo-area:hover { border-color: var(--green); background: var(--green-light); }
    .photo-area.filled { padding: 0; border-style: solid; border-color: var(--green); }
    .photo-area img {
      width: 100%; max-height: 210px;
      object-fit: cover; display: block;
      border-radius: calc(var(--radius) - 2px);
    }
    .upload-icon { font-size: 38px; margin-bottom: 10px; }
    .upload-text { font-size: 14px; color: var(--muted); font-weight: 500; }
    .upload-hint { font-size: 12px; color: #bbb; margin-top: 5px; }
    .remove-btn {
      font-size: 12px; color: var(--green);
      background: none; border: none; cursor: pointer;
      margin-top: 7px; padding: 3px 0; display: none;
    }

    /* ── botão enviar ── */
    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--green); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: -.1px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .18s, transform .1s;
      box-shadow: 0 5px 18px rgba(29,158,117,.32);
      margin-top: .25rem;
    }
    .btn-submit:hover  { background: var(--green-dark); }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { background: #b0b0b0; box-shadow: none; cursor: not-allowed; transform: none; }

    /* ── status ── */
    .status {
      margin-top: 1rem; padding: 13px 16px;
      border-radius: 10px; font-size: 14px;
      display: none; align-items: center; gap: 12px;
    }
    .status.show    { display: flex; }
    .status.success { background: #E1F5EE; color: #085041; border: 1px solid #5DCAA5; }
    .status.error   { background: #FEF0F0; color: #7A1F1F; border: 1px solid #f7a0a0; }
    .status.loading { background: #f5f5f3; color: #555;    border: 1px solid #ddd; }

    .spinner {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 2.5px solid #ddd; border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── tela sucesso ── */
    #successView { display: none; text-align: center; padding: 3rem 1rem; }
    #successView.show { display: block; }
    .ok-circle {
      width: 82px; height: 82px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .ok-circle svg { width: 40px; height: 40px; stroke: var(--green); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    #successView h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    #successView p  { font-size: 15px; color: var(--muted); margin-bottom: 1.8rem; line-height: 1.6; }
    .btn-novo {
      padding: 13px 30px;
      background: var(--green); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(29,158,117,.3);
    }
    .btn-novo:hover { background: var(--green-dark); }

    .footer { text-align: center; margin-top: 2rem; font-size: 12px; color: #c0c0c0; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- ════════ FORMULÁRIO ════════ -->
  <div id="formView">

    <div class="header">
      <div class="logo">
        <!-- ícone de formatura -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Cadastro de aluno</h1>
      <p class="subtitle">Preencha todos os campos para se cadastrar</p>
    </div>

    <!-- dados pessoais -->
    <div class="card">
      <div class="field">
        <label for="nome">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Nome completo
        </label>
        <input type="text" id="nome" placeholder="Digite seu nome completo" maxlength="120"
               oninput="document.getElementById('nc').textContent=this.value.length" autocomplete="name" />
        <div class="char-count"><span id="nc">0</span> / 120</div>
      </div>

      <div class="field">
        <label for="curso">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Curso
        </label>
        <input type="text" id="curso" placeholder="Ex: Enfermagem, Direito, Engenharia..." maxlength="80"
               oninput="document.getElementById('cc').textContent=this.value.length" />
        <div class="char-count"><span id="cc">0</span> / 80</div>
      </div>
    </div>

    <!-- foto -->
    <div class="card">
      <div class="field">
        <label>
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Foto do aluno
        </label>
        <div class="photo-wrap">
          <div class="photo-area" id="photoArea" onclick="document.getElementById('fotoInput').click()" role="button" tabindex="0"
               onkeydown="if(event.key==='Enter')this.click()">
            <div id="placeholder">
              <div class="upload-icon">📷</div>
              <div class="upload-text">Clique para selecionar uma foto</div>
              <div class="upload-hint">JPG ou PNG — máximo 5 MB</div>
            </div>
            <img id="preview" src="" alt="Prévia da foto selecionada" style="display:none" />
          </div>
          <input type="file" id="fotoInput" accept="image/jpeg,image/png,image/webp"
                 style="display:none" onchange="carregarFoto(this)" />
        </div>
        <button class="remove-btn" id="removeBtn" onclick="removerFoto()">✕ Remover foto</button>
      </div>
    </div>

    <button class="btn-submit" id="btnEnviar" onclick="enviar()">
      ✈️ &nbsp;Enviar cadastro
    </button>

    <div class="status" id="statusBox" role="alert">
      <span id="statusIcon"></span>
      <span id="statusMsg"></span>
    </div>

    <p class="footer">Seus dados são enviados de forma segura.</p>
  </div>

  <!-- ════════ TELA DE SUCESSO ════════ -->
  <div id="successView">
    <div class="ok-circle">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>Cadastro enviado!</h2>
    <p>Seus dados foram registrados com sucesso.<br>Obrigado pela participação!</p>
    <button class="btn-novo" onclick="novoCadastro()">+ Novo cadastro</button>
  </div>

</div><!-- /wrapper -->

<script>
  // ╔══════════════════════════════════════════════════════════╗
  // ║  COLE AQUI A URL DO SEU GOOGLE APPS SCRIPT              ║
  // ║  (gerada após publicar como Web App)                    ║
  // ╚══════════════════════════════════════════════════════════╝
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlk23kIjp8AujXVvHN3BMe1alswv5z53tEY0lwNSZm/exec';

  let fotoBase64 = '';

  /* ── foto ── */
  function carregarFoto(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      mostrarStatus('error', 'Foto muito grande. Máximo permitido: 5 MB.');
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      fotoBase64 = e.target.result;
      const img = document.getElementById('preview');
      img.src = fotoBase64;
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('photoArea').classList.add('filled');
      document.getElementById('removeBtn').style.display = 'inline';
    };
    reader.readAsDataURL(file);
  }

  function removerFoto() {
    fotoBase64 = '';
    document.getElementById('fotoInput').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
    document.getElementById('photoArea').classList.remove('filled');
    document.getElementById('removeBtn').style.display = 'none';
  }

  /* ── status ── */
  function mostrarStatus(tipo, msg) {
    const box  = document.getElementById('statusBox');
    const icon = document.getElementById('statusIcon');
    box.className = 'status show ' + tipo;
    icon.innerHTML =
      tipo === 'loading' ? '<div class="spinner"></div>' :
      tipo === 'success' ? '✅' : '⚠️';
    document.getElementById('statusMsg').textContent = msg;
  }

  /* ── envio ── */
  async function enviar() {
    const nome  = document.getElementById('nome').value.trim();
    const curso = document.getElementById('curso').value.trim();

    if (!nome)       { mostrarStatus('error', 'Preencha o nome completo.'); return; }
    if (!curso)      { mostrarStatus('error', 'Preencha o curso.'); return; }
    if (!fotoBase64) { mostrarStatus('error', 'Adicione uma foto.'); return; }

    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    mostrarStatus('loading', 'Enviando dados, aguarde...');

    try {
      await fetch(SCRIPT_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ nome, curso, foto: fotoBase64 })
      });

      // Com no-cors não conseguimos ler a resposta — assumimos sucesso se não houve exceção
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').classList.add('show');

    } catch (err) {
      mostrarStatus('error', 'Falha na conexão. Verifique a internet e tente novamente.');
      btn.disabled = false;
    }
  }

  /* ── reiniciar ── */
  function novoCadastro() {
    ['nome','curso'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('nc').textContent = '0';
    document.getElementById('cc').textContent = '0';
    removerFoto();
    document.getElementById('statusBox').className = 'status';
    document.getElementById('btnEnviar').disabled = false;
    document.getElementById('successView').classList.remove('show');
    document.getElementById('formView').style.display = 'block';
  }
</script>
</body>
</html>
